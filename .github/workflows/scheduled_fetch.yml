name: Fetch AI News
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up API
        run: |
          for i in $(seq 1 12); do
            if curl -sf --max-time 10 ${{ secrets.API_URL }}/health; then
              echo "API is up"
              break
            fi
            echo "Attempt $i: API not ready, retrying in 15s..."
            sleep 15
          done

      - name: Trigger fetch
        run: |
          curl -X POST ${{ secrets.API_URL }}/admin/fetch \
            -H "X-Admin-Key: ${{ secrets.ADMIN_SECRET }}" \
            --max-time 30 \
            --fail
